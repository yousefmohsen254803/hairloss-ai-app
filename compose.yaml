services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hairloss-api
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hairloss-streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api